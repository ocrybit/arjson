name: Weavepack conformance

on:
  push:
    branches: [weavepack, master]
  pull_request:
    branches: [weavepack, master]

jobs:
  # ── JS reference implementation + core conformance ────────────────────
  js:
    name: JS reference (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: cd sdk && npm ci

      - name: Run SDK test suite
        run: cd sdk && npm test

      - name: Run conformance test vectors (JS reference)
        run: node weavepack/tools/verify-test-vectors.js

  # ── Rust crates ───────────────────────────────────────────────────────
  rust:
    name: Rust conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            impl/rust/target
          key: rust-${{ runner.os }}-${{ hashFiles('impl/rust/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install SDK (needed to generate reference bytes)
        run: cd sdk && npm ci

      - name: Build Rust workspace
        run: cd impl/rust && cargo build --release 2>&1

      - name: weavepack-json conformance (93/93 vectors)
        run: cd impl/rust && cargo run -p weavepack-json --bin conformance --release 2>&1

      - name: weavepack-tensor conformance (97/97 vectors)
        run: cd impl/rust && cargo run -p weavepack-tensor --bin conformance --release 2>&1

  # ── Python reference implementation ───────────────────────────────────
  python:
    name: Python conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK (needed to generate reference bytes)
        run: cd sdk && npm ci

      - name: weavepack-json Python conformance (93/93 decode + 68/68 encode)
        run: python3 impl/python/conformance.py

      - name: weavepack-tensor Python conformance (97/97 vectors)
        run: python3 impl/python/conformance_tensor.py

      - name: Python skip-load + streaming unit tests
        run: cd impl/python && python3 -m unittest test_skip_load -v 2>&1

      - name: Python delta-from-prior unit tests
        run: cd impl/python && python3 -m unittest test_delta_from_prior -v 2>&1

      - name: Python chain framing unit tests
        run: cd impl/python && python3 -m unittest test_chain -v 2>&1

  # ── Cross-language agreement (all impls agree on every vector) ─────────
  cross-language:
    name: Cross-language agreement
    runs-on: ubuntu-latest
    needs: [js, rust, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            impl/rust/target
          key: rust-${{ runner.os }}-${{ hashFiles('impl/rust/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install SDK
        run: cd sdk && npm ci

      - name: Build Rust (release)
        run: cd impl/rust && cargo build --release 2>&1

      - name: Full cross-language conformance sweep
        run: bash weavepack/tools/cross-language-check.sh
